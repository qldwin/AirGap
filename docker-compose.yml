services:

  db:
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

  web:
    build: .
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file: ".env"
    environment:
      NUXT_DATABASE_URL: postgresql://toto:your_secure_password_here@db:5432/db_toto